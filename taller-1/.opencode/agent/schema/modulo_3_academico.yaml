    syllabus_template_topic_subtopic:
      desc: Plantillas reutilizables para armar sílabos rápidos.
      cols: id:serial,syllabus_template_topic_id:int,subtopic_id:int,fl_status:bool,company_id:int
    syllabus_topic:
      desc: Asignación granular de subtemas y materiales específicos a semanas exactas.
      cols: id:serial,syllabus_id:int,topic_id:int,fl_status:bool,is_topic_deleted:bool,company_id:int
    syllabus_topic_week:
